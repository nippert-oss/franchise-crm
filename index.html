<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정총무 CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">

  <!-- 로그인 화면 -->
  <div id="loginScreen" class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-white">정총무 CRM</h1>
      <p class="text-gray-400 text-sm mt-1">프랜차이즈 가맹영업 관리 플랫폼</p>
    </div>

    <div class="bg-gray-900 rounded-2xl p-6 space-y-4">
      <div>
        <label class="text-sm text-gray-400 mb-1 block">이메일</label>
        <input
          id="email"
          type="email"
          placeholder="이메일 입력"
          class="w-full bg-gray-800 text-white rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div>
        <label class="text-sm text-gray-400 mb-1 block">비밀번호</label>
        <input
          id="password"
          type="password"
          placeholder="비밀번호 입력"
          class="w-full bg-gray-800 text-white rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <button
        onclick="login()"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-3 text-sm font-medium transition"
      >
        로그인
      </button>
      <p id="errorMsg" class="text-red-400 text-xs text-center hidden"></p>
    </div>
  </div>

  <!-- 로그인 후 대시보드 (임시) -->
  <div id="dashboard" class="hidden w-full max-w-sm px-6">
    <div class="text-center">
      <h2 class="text-xl font-bold">👋 로그인 성공!</h2>
      <p id="userEmail" class="text-gray-400 text-sm mt-2"></p>
      <button
        onclick="logout()"
        class="mt-6 bg-gray-800 hover:bg-gray-700 text-white rounded-xl px-6 py-2 text-sm"
      >
        로그아웃
      </button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://yowpwrziyxuljhsewlrm.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlvd3B3cnppeXh1bGpoc2V3bHJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzU4MzYsImV4cCI6MjA5MDk1MTgzNn0.rpqjEV5ygfbcEq2JcyLvO7mwlycy2lLeNw-NkEsUhMA'

    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errMsg = document.getElementById('errorMsg')

      const { data, error } = await sb.auth.signInWithPassword({ email, password })

      if (error) {
        errMsg.textContent = '이메일 또는 비밀번호를 확인해주세요.'
        errMsg.classList.remove('hidden')
        return
      }

      showDashboard(data.user.email)
    }

    async function logout() {
      await sb.auth.signOut()
      document.getElementById('loginScreen').classList.remove('hidden')
      document.getElementById('dashboard').classList.add('hidden')
    }

    function showDashboard(email) {
      document.getElementById('loginScreen').classList.add('hidden')
      document.getElementById('dashboard').classList.remove('hidden')
      document.getElementById('userEmail').textContent = email
    }

    // 이미 로그인된 경우 자동으로 대시보드
    sb.auth.getSession().then(({ data }) => {
      if (data.session) {
        showDashboard(data.session.user.email)
      }
    })
  </script>

</body>
</html>
